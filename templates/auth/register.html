{% extends "base.html" %}

{% block title %}Inscription — MVPForge{% endblock %}

{% block body_class %}auth-page{% endblock %}

{% block footer %}{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-card reveal visible">
    <div class="auth-card-head">
      <a href="{{ url_for('site.home') }}" class="logo logo-center">
        <span class="logo-icon">
          <svg width="32" height="32" viewBox="0 0 28 28" fill="none" aria-hidden="true">
            <rect width="28" height="28" rx="8" fill="currentColor"/>
            <path d="M8 18L14 8L20 18" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M10 18H18" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </span>
      </a>
      <h1>Inscription</h1>
      <p>Créez votre compte pour acheter ou vendre des MVPs</p>
    </div>

    <form class="auth-form" method="post" action="{{ url_for('auth.register') }}">
      <div class="form-group">
        <label for="name">Nom <span class="label-opt">(optionnel)</span></label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Votre nom"
          autocomplete="name"
          value="{{ request.form.get('name', '') }}"
        >
      </div>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="vous@exemple.com"
          autocomplete="email"
          required
          value="{{ request.form.get('email', '') }}"
        >
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="8 caractères minimum"
          autocomplete="new-password"
          required
          minlength="8"
        >
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirmer le mot de passe</label>
        <input
          type="password"
          id="confirm_password"
          name="confirm_password"
          placeholder="••••••••"
          autocomplete="new-password"
          required
          minlength="8"
        >
      </div>
      <button type="submit" class="btn btn-primary btn-full">Créer mon compte</button>
    </form>

    <p class="auth-switch">
      Déjà un compte ?
      <a href="{{ url_for('auth.login') }}">Se connecter</a>
    </p>
  </div>
</section>
{% endblock %}
